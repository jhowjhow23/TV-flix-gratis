<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TVFLIX - Baixe Grátis</title>
<meta name="description" content="Baixe o TVFLIX grátis no site. Séries, filmes e novelas grátis no Android.">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #000;
    -webkit-tap-highlight-color: transparent;
  }

  .page {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    background: #000;
  }

  .hero {
    position: relative;
    width: min(100%, 480px);
    line-height: 0;
  }

  .hero img {
    width: 100%;
    height: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  .btn-download {
    position: absolute;
    left: 50%;
    bottom: 11.8%;
    transform: translateX(-50%);
    width: 74%;
    height: 7.8%;
    border: none;
    border-radius: 14px;
    background: transparent;
    cursor: pointer;
    text-decoration: none;
  }

  .btn-download:active {
    background: rgba(255, 255, 255, 0.08);
  }
</style>
</head>
<body>
  <main class="page">
    <div class="hero">
      <img src="/landing-bg.png" alt="Baixe o TVFLIX grátis no site — séries, filmes e novelas grátis">
      <a href="/TVflix.apk" class="btn-download" download="TVflix.apk" aria-label="Baixar grátis"></a>
    </div>
  </main>
</body>
</html>
